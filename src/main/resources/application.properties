spring.application.name=WingStep
server.port=8080

# Web : JSP 위치 설정.
#=> src/main/webapp 를 Root 로 지정.
#=> 예>src/main/webapp/abc.jsp   존재.
#=> 예> http://ip:port/abc.jsp 
spring.mvc.view.prefix=/
#spring.mvc.view.suffix=.jsp
#=> 위 형식의 설정은.
#=> 예> http://ip:port/abc  로 접근.


# Web : 한글처리 설정.
# Client Data Post 방식 인코딩 처리
server.servlet.encoding.charset=UTF-8
# Client Data Get 방식 인코딩 처리
server.tomcat.uri-encoding=UTF-8

# ErrorPageFilter
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

#B/L 설정
# MySQL 접속 정보 | aws는 10.0.4.10
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://10.0.4.10:3306/wingstep?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=deep
spring.datasource.password=deep

# MyBatis Meta-Data 설정
# MyBatis mybatis-config.xml  위치 지정 
mybatis.config-location=classpath:sql/mybatis-config.xml
# MyBatis mybatis-config.xml  없이 mapper 로만 구성된 경우.
#mybatis.mapper-locations=classpath:sql/**/**.xml

# 파일 한 개당 최대 사이즈
spring.servlet.multipart.max-file-size=10MB
# 요청 전체 최대 사이즈
spring.servlet.multipart.max-request-size=20MB

#=================== 추가, 변경된 부분  ==========================/
#==> Spring Boot 시 추가된 부분.  //==> No Meta Data ==> No XML
#=================== 추가, 변경된 부분  ==========================/
## FileName : common.properties
#spring.config.import=classpath:config/common.properties

# Logback
logging.level.root=INFO
logging.level.com.model2.mvc=ERROR
logging.file.name=logs/app.log

# ==========================================
# Wingstep Course Configuration
# ==========================================

# 코스 이탈 허용 시간 (초) - 이 시간 이상 이탈 시 강제 종료
wingstep.course.monitor.off-route-limit-seconds=10

# 완주/경로 이탈 판단 반경 (미터)
wingstep.course.monitor.complete.radius-meters=500
wingstep.course.monitor.leave.radius-meters=100

# 경험치 획득 배율 (거리 km * 배율)
wingstep.course.exp-multiplier=100

# 스케줄러 실행 주기 (밀리초)
wingstep.course.monitor.interval-ms=1000

# 후기 이미지 저장관련
# 기존 로컬 경로 C:/upload/review | aws용 경로 /home/ubuntu/wingstep/upload/review
app.upload.review-dir=/home/ubuntu/wingstep/upload/review
app.review.base-url=https://wingstep.shop/api/upload/review

